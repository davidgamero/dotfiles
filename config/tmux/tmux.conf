set -g mouse on

# Clipboard via OSC52 (Ghostty supports read+write)
set -g set-clipboard on
set -as terminal-features ',tmux-256color:clipboard'
set -as terminal-features ',xterm-ghostty:clipboard'
set -as terminal-features ',screen*:clipboard'
# Allow apps inside tmux to use OSC sequences (needed for OSC52 read passthrough)
set -g allow-passthrough on
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

#Plugins
set -g @plugin 'alberti42/tmux-fzf-links'
set -g @fzf-links-browser-open-cmd "tmux set-buffer -w -- '%url'"
set -g @fzf-links-fzf-path "~/.fzf/bin/fzf"
set -g @plugin 'tmux-plugins/tpm'

# Session/window tree (expanded by default)
bind-key s choose-tree -wZ -O name

# New session (prompts for name)
bind-key n command-prompt -p "new session:" "new-session -s '%%'"

# New window/tab
bind-key t new-window

# Enable vi-mode in copy mode
set-window-option -g mode-keys vi

# Bind h, j, k, l to pane switching after prefix key
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane navigation with Alt + Vim keys
# bind-key -n M-h select-pane -L
# bind-key -n M-j select-pane -D
# bind-key -n M-k select-pane -U
# bind-key -n M-l select-pane -R

# Status bar - two lines
set -g status 2
set -g status-style "bg=brightblack,fg=white"

# Top line: all sessions
set -g status-format[1] "#[align=left bg=black,fg=white] sessions:#{S: #[#{?session_attached,bold bg=brightblack,dim}] #{session_name} #[nobold bg=black default]}"

# Bottom line: windows in current session
set -g status-left "#[bold] [#{session_name}] "
set -g status-right " %H:%M "
set -g status-left-length 20

# Window list
set -g window-status-current-style "bg=white,fg=black,bold"
set -g window-status-format "  #{window_index}:#{window_name}  "
set -g window-status-current-format "  #{window_index}:#{window_name}  "
set -g window-status-style "fg=white,dim"

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=white"

# Message/command bar
set -g message-style "bg=brightblack,fg=white"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
